version: v1
runConfig:
  runCommand: ./build.sh
  environmentVariables:
    - variable: PORT
      value: 8080
      availability: RUNTIME
  availability: RUNTIME
  concurrency: 80
  cpu: 2
  memoryMiB: 512
  minInstances: 0
  maxInstances: 14
outputFiles:
  serverApp:
    include:
      - dist
      - node_modules
metadata:
  adapterPackageName: bun-adapter
  adapterVersion: 1.0.0
  framework: expo
  frameworkVersion: 51.0.28
